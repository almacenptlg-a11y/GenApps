<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenApps | La Genovesa</title>

<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e01f36">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.svg">

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 flex h-screen overflow-hidden font-sans transition-colors duration-300">

<main id="login-view" class="w-full h-full flex items-center justify-center absolute inset-0 bg-gray-50 dark:bg-gray-900 z-50 hidden transition-opacity duration-300">
<div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md text-center border border-gray-100 dark:border-gray-700">
<div class="w-32 h-32 mx-auto mb-6">
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
<defs>
<radialGradient id="a" cx="50%" cy="30%" r="80%" fx="50%" fy="30%"><stop offset="0%" style="stop-color:#e01f36;stop-opacity:1"/><stop offset="100%" style="stop-color:#a5081b;stop-opacity:1"/></radialGradient>
<linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#fad7a0;stop-opacity:1"/><stop offset="50%" style="stop-color:#b08d57;stop-opacity:1"/><stop offset="100%" style="stop-color:#8c6e3f;stop-opacity:1"/></linearGradient>
<filter id="c" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/><feOffset in="blur" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope=".3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect x="2.5" y="2.5" width="195" height="195" rx="45" ry="45" fill="url(#a)"/>
<g fill="none" stroke="url(#b)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"><path d="m15 45 85-30 85 30"/><path d="m15 155 85 30 85-30"/></g>
<g fill="#fff" font-family="Arial, Helvetica, sans-serif" font-weight="900" filter="url(#c)"><text x="98" y="122" font-size="110" text-anchor="middle" letter-spacing="-5">Gen</text><text x="198" y="150" font-size="40" text-anchor="end" letter-spacing="1">Apps</text></g>
</svg>
</div>
<h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Acceso Corporativo</h2>
<p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Ingresa tus credenciales para continuar</p>
<form id="loginForm" class="space-y-4">
<input type="text" id="username" autocomplete="username" placeholder="Usuario" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-red-600 focus:outline-none transition-all">
<input type="password" id="password" autocomplete="current-password" placeholder="Contraseña" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-red-600 focus:outline-none transition-all">
<button type="submit" id="btnSubmit" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 shadow-md transition flex justify-center items-center gap-2">Ingresar</button>
<p id="errorMsg" class="text-red-500 text-sm hidden mt-2 font-medium"></p>
</form>
</div>
</main>

<div id="hub-view" class="w-full h-full flex flex-col hidden relative">
<header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm flex items-center justify-between px-4 sm:px-6 z-30 transition-colors">
<div class="flex items-center gap-4">
                <button onclick="handleLogoClick()" class="w-10 h-10 focus:outline-none transition-transform hover:scale-105" aria-label="Menú e Inicio">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-sm">
                        <defs>
                            <radialGradient id="bg-header" cx="50%" cy="30%" r="80%" fx="50%" fy="30%">
                                <stop offset="0%" style="stop-color:#e01f36;stop-opacity:1"/>
                                <stop offset="100%" style="stop-color:#a5081b;stop-opacity:1"/>
                            </radialGradient>
                            <linearGradient id="stroke-header" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#fad7a0;stop-opacity:1"/>
                                <stop offset="50%" style="stop-color:#b08d57;stop-opacity:1"/>
                                <stop offset="100%" style="stop-color:#8c6e3f;stop-opacity:1"/>
                            </linearGradient>
                            <filter id="shadow-header" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
                                <feOffset in="blur" dy="2" result="offsetBlur"/>
                                <feComponentTransfer><feFuncA type="linear" slope=".3"/></feComponentTransfer>
                                <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                        </defs>
                        <rect x="2.5" y="2.5" width="195" height="195" rx="45" ry="45" fill="url(#bg-header)"/>
                        <g fill="none" stroke="url(#stroke-header)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m15 45 85-30 85 30"/><path d="m15 155 85 30 85-30"/>
                        </g>
                        <g fill="#fff" font-family="Arial, Helvetica, sans-serif" font-weight="900" filter="url(#shadow-header)">
                            <text x="98" y="122" font-size="110" text-anchor="middle" letter-spacing="-5">Gen</text>
                            <text x="198" y="150" font-size="40" text-anchor="end" letter-spacing="1">Apps</text>
                        </g>
                    </svg>
                </button>
                <h1 id="appTitle" class="text-lg font-bold text-gray-700 dark:text-white hidden sm:block ml-2">Inicio</h1>
            </div>
<div class="flex items-center gap-6">
<div class="text-right hidden sm:block">
<p id="userName" class="text-sm font-bold text-gray-800 dark:text-white leading-tight">Cargando...</p>
<p id="userRole" class="text-xs text-gray-500 dark:text-gray-400 uppercase font-semibold">--</p>
</div>
<div class="h-10 w-auto">
<svg class="h-full w-full" viewBox="0 0 284 164" xmlns="http://www.w3.org/2000/svg"><path d="m142 7 135 47v56l-135 47-135-47V54z" fill="#C50D23" stroke="#C50D23" stroke-width="10" stroke-linejoin="round"></path><path d="m142 7 135 47v56l-135 47-135-47V54z" fill="none" stroke="#B08D57" stroke-width="2" stroke-linejoin="round"></path><text x="142" y="68" font-family="Times, serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#404040">LA</text><text x="142" y="67" font-family="Times, serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#FFF">LA</text><text x="142" y="103" font-family="Times, serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#404040">GENOVESA</text><text x="142" y="102" font-family="Times, serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#FFF">GENOVESA</text><text x="142" y="127" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#FFF" letter-spacing="3">DESDE 1977</text></svg>
</div>
</div>
</header>

<div class="flex flex-1 relative overflow-hidden">
<aside id="sidebar" class="absolute inset-y-0 left-0 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 z-20 shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col">
<nav id="appMenu" class="flex-1 overflow-y-auto py-4 px-3 space-y-1 mt-2"></nav>
<footer class="p-3 border-t border-gray-100 dark:border-gray-700 space-y-1 bg-gray-50 dark:bg-gray-900/50">
<button id="theme-toggle-btn" class="w-full flex items-center gap-3 p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" onclick="toggleTheme()"></button>
<button class="w-full flex items-center gap-3 p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" onclick="openCredentialsModal()">
<i class="ph ph-key text-xl"></i><span class="font-medium text-sm">Editar Credenciales</span>
</button>
<button class="w-full flex items-center gap-3 p-2 rounded-lg text-red-600 hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors mt-2" onclick="logout()">
<i class="ph ph-sign-out text-xl"></i><span class="font-bold text-sm">Cerrar Sesión</span>
</button>
</footer>
</aside>
<div id="sidebarOverlay" class="absolute inset-0 bg-black/40 z-10 hidden backdrop-blur-sm transition-opacity" onclick="toggleMenu()"></div>

<main class="flex-1 flex flex-col relative bg-gray-100 dark:bg-gray-900 w-full h-full overflow-hidden transition-colors">
<section id="home-dashboard" class="absolute inset-0 p-6 md:p-10 overflow-y-auto z-10 bg-gray-100 dark:bg-gray-900 transition-all duration-300">
<div id="welcome-banner" class="mb-10"></div>
                    <div id="cards-container" class="grid grid-cols-[repeat(auto-fill,minmax(240px,1fr))] gap-5 sm:gap-6 pb-10"></div>
                    <div id="cards-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6 pb-24"></div>
</section>
<section id="iframe-container" class="absolute inset-0 z-0 hidden">
<div id="loader" class="absolute inset-0 bg-gray-100/80 dark:bg-gray-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-50 hidden">
<i class="ph ph-spinner-gap animate-spin text-5xl text-red-600 mb-3"></i><p class="text-gray-600 dark:text-gray-300 font-medium">Cargando módulo...</p>
</div>
<iframe id="appViewer" class="w-full h-full border-none shadow-inner" src="about:blank"></iframe>
</section>
</main>
</div>
</div>

<div id="onboardingModal" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center backdrop-blur-md transition-opacity">
<div class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl w-full max-w-md p-8 transform scale-95 transition-transform border border-gray-100 dark:border-gray-700">
<div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
<i class="ph ph-user-focus text-3xl"></i>
</div>
<h3 class="text-2xl font-black text-center text-gray-800 dark:text-white mb-2">Completa tu Perfil</h3>
<p class="text-sm text-center text-gray-500 dark:text-gray-400 mb-6">Necesitamos tu Nombre y Correo Institucional antes de darte acceso al sistema.</p>
<form id="formOnboarding" class="space-y-5">
<input type="hidden" id="onboardUserTemp">
<div>
<label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Nombre Completo</label>
<input type="text" id="onboardNombre" placeholder="Ej: Juan Pérez" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-600 dark:text-white rounded-xl focus:ring-2 focus:ring-red-600 focus:outline-none" required>
</div>
<div>
<label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Correo Electrónico</label>
<input type="email" id="onboardCorreo" placeholder="tu.correo@empresa.com" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-600 dark:text-white rounded-xl focus:ring-2 focus:ring-red-600 focus:outline-none" required>
</div>
<button type="submit" id="btnOnboardSubmit" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 transition flex items-center justify-center gap-2 mt-4">
Guardar y Continuar <i class="ph ph-arrow-right"></i>
</button>
</form>
</div>
</div>

<div id="credentialsModal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center backdrop-blur-sm transition-opacity">
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-sm p-6 transform scale-95 transition-transform border border-gray-100 dark:border-gray-700">
<div class="flex justify-between items-center mb-4">
<h3 class="text-lg font-bold text-gray-800 dark:text-white">Actualizar Credenciales</h3>
<button onclick="closeCredentialsModal()" class="text-gray-400 hover:text-gray-800 dark:hover:text-white"><i class="ph ph-x text-xl"></i></button>
</div>
<form id="formCredenciales" class="space-y-4">
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nuevo Usuario</label>
<input type="text" id="newUsername" autocomplete="username" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 dark:text-white rounded-lg focus:ring-2 focus:ring-red-600 focus:outline-none" required>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nueva Contraseña</label>
<input type="password" id="newPassword" autocomplete="new-password" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 dark:text-white rounded-lg focus:ring-2 focus:ring-red-600 focus:outline-none" required>
</div>
<button type="submit" class="w-full bg-red-600 text-white font-bold py-2 rounded-lg hover:bg-red-700 transition">Guardar Cambios</button>
</form>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
